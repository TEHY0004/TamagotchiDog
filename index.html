<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>🐾 Pup Pals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #fde8f8 0%, #e8f8f0 50%, #e8f0fd 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}

/* ── Animations ── */
@keyframes idleBob      { 0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-6px) rotate(-1.2deg)}70%{transform:translateY(-4px) rotate(1deg)} }
@keyframes happyBounce  { 0%,100%{transform:translateY(0) scaleY(1) scaleX(1)}20%{transform:translateY(-20px) scaleY(1.08) scaleX(0.93)}40%{transform:translateY(0) scaleY(0.91) scaleX(1.07)}60%{transform:translateY(-11px) scaleY(1.04) scaleX(0.97)}80%{transform:translateY(0) scaleY(0.97) scaleX(1.03)} }
@keyframes runCycle     { 0%{transform:translateX(0) scaleX(1)}45%{transform:translateX(-68px) scaleX(1)}50%{transform:translateX(-68px) scaleX(-1)}95%{transform:translateX(0) scaleX(-1)}100%{transform:translateX(0) scaleX(1)} }
@keyframes eatNod       { 0%,100%{transform:rotate(0deg) translateY(0)}30%{transform:rotate(13deg) translateY(5px)}60%{transform:rotate(5deg) translateY(2px)} }
@keyframes petWiggle    { 0%,100%{transform:rotate(0deg) scale(1)}15%{transform:rotate(-7deg) scale(1.06)}35%{transform:rotate(7deg) scale(1.06)}55%{transform:rotate(-4deg) scale(1.04)}75%{transform:rotate(4deg) scale(1.04)} }
@keyframes sleepBreathe { 0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(0.965) scaleX(1.022)} }
@keyframes sadDroop     { 0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(4px) rotate(-1.8deg)} }
@keyframes tailFast     { 0%,100%{transform:rotate(-12deg)}50%{transform:rotate(38deg)} }
@keyframes tailSlow     { 0%,100%{transform:rotate(-5deg)}50%{transform:rotate(22deg)} }
@keyframes zzzFloat     { 0%{opacity:0;transform:translate(0,0) scale(0.7)}20%{opacity:1}80%{opacity:0.8}100%{opacity:0;transform:translate(-14px,-32px) scale(1.3)} }
@keyframes particlePop  { 0%{opacity:1;transform:translate(0,0) scale(0.5) rotate(0deg)}60%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3) rotate(var(--tr))}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.5) rotate(var(--tr2))} }
@keyframes popIn        { 0%{transform:scale(0.75) translateY(14px);opacity:0}70%{transform:scale(1.04) translateY(-2px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1} }
@keyframes msgBounce    { 0%{opacity:0;transform:translateX(-50%) scale(0.8) translateY(8px)}70%{opacity:1;transform:translateX(-50%) scale(1.05) translateY(-2px)}100%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)} }
@keyframes xpShimmer    { 0%{background-position:-200% center}100%{background-position:200% center} }
@keyframes shadowPulse  { 0%,100%{transform:translateX(-50%) scaleX(1);opacity:.22}50%{transform:translateX(-50%) scaleX(.72);opacity:.10} }
@keyframes stagePulse   { 0%,100%{box-shadow:0 0 0 0 rgba(255,180,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,180,0,0)} }
@keyframes cardHover    { to{transform:translateY(-8px) scale(1.03)} }
@keyframes lowPulse     { 0%,100%{opacity:1}50%{opacity:.55} }

/* ── Screens ── */
.screen { display:none; width:100%; max-width:400px; }
.screen.active { display:block; animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both; }

/* ── Select screen ── */
#select-screen { text-align:center; }
.select-title { font-family:'Baloo 2'; font-size:clamp(28px,6vw,48px); color:#333; margin-bottom:6px; letter-spacing:-.5px; }
.select-sub   { color:#aaa; font-size:14px; font-weight:700; margin-bottom:28px; }
.breed-cards  { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.breed-card   {
  background:white; border-radius:24px; padding:24px 18px;
  text-align:center; width:190px; cursor:pointer;
  box-shadow:0 8px 28px rgba(0,0,0,.09);
  border:3px solid var(--light); transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both;
}
.breed-card:hover { transform:translateY(-8px) scale(1.03); box-shadow:0 18px 44px rgba(0,0,0,.14); }
.breed-card:active { transform:scale(.96); }
.breed-emoji { font-size:64px; line-height:1.05; margin-bottom:8px; }
.breed-name  { font-family:'Baloo 2'; font-size:18px; color:#333; margin-bottom:4px; }
.breed-trait { display:inline-block; padding:3px 11px; border-radius:999px; font-size:11px; font-weight:800; margin-bottom:9px; }
.breed-desc  { color:#999; font-size:12px; line-height:1.5; margin-bottom:14px; }
.adopt-btn   { padding:10px 0; border-radius:13px; color:white; font-weight:800; font-size:14px; }

/* ── Naming screen ── */
#naming-screen { display:none; align-items:center; justify-content:center; }
#naming-screen.active { display:flex; }
.name-card {
  background:white; border-radius:28px; padding:36px 38px;
  text-align:center; box-shadow:0 14px 50px rgba(0,0,0,.12); max-width:340px; width:100%;
}
.name-emoji  { font-size:68px; margin-bottom:8px; }
.name-title  { font-family:'Baloo 2'; font-size:24px; color:#333; margin-bottom:5px; }
.name-sub    { color:#bbb; font-size:13px; margin-bottom:18px; }
#name-input  {
  width:100%; padding:12px 16px; border-radius:13px;
  border:2.5px solid var(--primary,#e879a0); font-size:18px;
  font-family:'Nunito'; font-weight:800; color:#333; outline:none; text-align:center; margin-bottom:14px;
}
.confirm-btn {
  width:100%; padding:14px; border-radius:13px; border:none;
  color:white; font-size:16px; font-family:'Nunito'; font-weight:800; cursor:pointer;
  transition:transform .15s; margin-bottom:9px;
}
.confirm-btn:hover { transform:scale(1.03); }
.back-btn { background:none; border:none; color:#ccc; cursor:pointer; font-family:'Nunito'; font-size:13px; font-weight:700; }

/* ── Game screen ── */
#game-screen header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.pet-name-line { font-family:'Baloo 2'; font-size:22px; color:#333; line-height:1.1; }
.stage-badge {
  display:inline-block; margin-top:3px; padding:2px 11px; border-radius:999px;
  color:white; font-size:11px; font-weight:800;
  animation:stagePulse 2.5s ease-in-out infinite;
}
.menu-btn {
  background:none; border:2px solid var(--primary-40,#e879a055); border-radius:10px;
  padding:5px 11px; cursor:pointer; color:var(--accent,#c0527a);
  font-weight:800; font-size:11px; font-family:'Nunito';
}

/* XP bar */
.xp-row  { display:flex; justify-content:space-between; font-size:11px; color:#bbb; font-weight:700; margin-bottom:3px; }
.xp-track{ height:8px; background:#e8e0e8; border-radius:999px; overflow:hidden; margin-bottom:12px; }
.xp-fill {
  height:100%; border-radius:999px; background-size:200% 100%;
  animation:xpShimmer 2.5s linear infinite; transition:width 1s ease;
}

/* Dog stage */
#dog-stage {
  position:relative; border-radius:26px; height:230px; overflow:hidden; margin-bottom:12px;
  box-shadow:0 8px 36px var(--primary-30,#e879a030);
  border:3px solid var(--primary-40,#e879a040);
}
.stage-ground {
  position:absolute; bottom:12px; left:50%; width:90px; height:14px;
  background:var(--primary-20,#e879a022); border-radius:50%;
  animation:shadowPulse 3s ease-in-out infinite; transform:translateX(-50%);
}
.stage-floor {
  position:absolute; bottom:0; left:0; right:0; height:36px;
  border-radius:0 0 24px 24px;
}
#dog-wrap {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  width:130px; height:130px; display:flex; align-items:flex-end; justify-content:center;
}
#dog-svg-container {
  transform-origin:bottom center;
  transition:transform .6s cubic-bezier(.34,1.56,.64,1);
}
.mood-badge { position:absolute; top:10px; right:12px; font-size:22px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.15)); }
#message-bubble {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  background:white; border-radius:15px; padding:6px 14px;
  font-size:13px; font-weight:800; color:#444;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
  white-space:nowrap; pointer-events:none; display:none;
  border:2px solid var(--primary-55,#e879a055);
}
#message-bubble.show { display:block; animation:msgBounce .35s cubic-bezier(.34,1.56,.64,1); }
#particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }

/* Stats panel */
.stats-panel {
  background:white; border-radius:20px; padding:14px 16px; margin-bottom:12px;
  box-shadow:0 4px 18px var(--primary-18,rgba(232,121,160,.1));
  border:2px solid var(--primary-28,rgba(232,121,160,.17));
}
.stat-row { margin-bottom:9px; }
.stat-row:last-child { margin-bottom:0; }
.stat-label { display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:#555; margin-bottom:4px; }
.stat-val { transition:color .4s; }
.stat-track { height:10px; background:#ede8e8; border-radius:999px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(0,0,0,.08); }
.stat-fill { height:100%; border-radius:999px; transition:width .55s ease, background .5s ease; }

/* Actions panel */
.actions-panel {
  display:flex; gap:9px; justify-content:center;
  background:white; border-radius:20px; padding:14px 10px;
  box-shadow:0 4px 18px var(--primary-18,rgba(232,121,160,.1));
  border:2px solid var(--primary-28,rgba(232,121,160,.17));
}
.action-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:10px 12px; border-radius:18px; border:2.5px solid;
  font-family:'Nunito'; font-weight:800; font-size:12px; min-width:58px;
  cursor:pointer; outline:none;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, background .15s ease;
}
.action-btn:not(:disabled):hover  { transform:translateY(-3px) scale(1.08); }
.action-btn:not(:disabled):active { transform:scale(.92); }
.action-btn:disabled { border-color:#ddd!important; background:#f5f5f5!important; color:#bbb!important; cursor:not-allowed; }
.action-btn .btn-icon { font-size:22px; }

/* Menu overlay */
#menu-overlay {
  background:white; border-radius:16px; padding:14px 16px; margin-bottom:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.1); border:2px solid var(--primary-33);
  display:none; animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
#menu-overlay.show { display:block; }
.menu-text { font-size:13px; color:#888; margin-bottom:10px; font-weight:700; }
.menu-btns { display:flex; gap:8px; }
.abandon-btn { flex:1; padding:9px 0; border-radius:12px; border:2px solid #ff5050; background:#fff0f0; color:#dd3030; font-weight:800; font-size:12px; cursor:pointer; font-family:'Nunito'; }
.close-menu-btn { flex:1; padding:9px 0; border-radius:12px; font-weight:800; font-size:12px; cursor:pointer; font-family:'Nunito'; }

.footer-hint { text-align:center; margin-top:8px; font-size:11px; color:#ccc; font-weight:700; }

/* Util */
.low-anim { animation:lowPulse .9s ease-in-out infinite; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ SELECT ═══ -->
<div id="select-screen" class="screen active">
  <h1 class="select-title">🐾 Adopt a Pup!</h1>
  <p class="select-sub">Choose a breed — they'll grow up with you 🌱</p>
  <div class="breed-cards" id="breed-cards"></div>
</div>

<!-- ═══════════════════════════════════════════ NAMING ═══ -->
<div id="naming-screen" class="screen">
  <div class="name-card">
    <div class="name-emoji" id="naming-emoji"></div>
    <h2 class="name-title" id="naming-title"></h2>
    <p class="name-sub">What shall we call them?</p>
    <input id="name-input" maxlength="16" autocomplete="off" spellcheck="false"/>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmName()">Let's go! 🐾</button>
    <button class="back-btn" onclick="goTo('select')">← Back</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ GAME ════ -->
<div id="game-screen" class="screen">
  <header>
    <div>
      <div class="pet-name-line" id="pet-name-line"></div>
      <div class="stage-badge" id="stage-badge"></div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">⚙️ Menu</button>
  </header>

  <div id="menu-overlay">
    <p class="menu-text">💾 Your pet is auto-saved every 8 seconds.</p>
    <div class="menu-btns">
      <button class="abandon-btn" onclick="abandonPet()">🗑️ Abandon pet</button>
      <button class="close-menu-btn" id="close-menu-btn" onclick="toggleMenu()">✓ Close</button>
    </div>
  </div>

  <div class="xp-row"><span id="xp-label">⚡ XP 0</span><span id="xp-next-label">Next: 120</span></div>
  <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>

  <div id="dog-stage">
    <div class="stage-floor" id="stage-floor"></div>
    <div class="stage-ground" id="stage-ground"></div>
    <div id="particles"></div>
    <div id="dog-wrap">
      <div id="dog-svg-container"></div>
    </div>
    <div class="mood-badge" id="mood-badge">😄</div>
    <div id="message-bubble"></div>
  </div>

  <div class="stats-panel">
    <div class="stat-row">
      <div class="stat-label"><span>🍗 Hunger</span><span class="stat-val" id="hunger-val">80</span></div>
      <div class="stat-track"><div class="stat-fill" id="hunger-fill" style="background:linear-gradient(90deg,#ff906099,#ff7043)"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>😊 Happiness</span><span class="stat-val" id="happy-val">80</span></div>
      <div class="stat-track"><div class="stat-fill" id="happy-fill"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>⚡ Energy</span><span class="stat-val" id="energy-val">88</span></div>
      <div class="stat-track"><div class="stat-fill" id="energy-fill" style="background:linear-gradient(90deg,#90caf999,#42a5f5)"></div></div>
    </div>
  </div>

  <div class="actions-panel">
    <button class="action-btn" id="btn-feed"  onclick="doAction('eating')" ><span class="btn-icon">🦴</span>Feed</button>
    <button class="action-btn" id="btn-pet"   onclick="doAction('petting')"><span class="btn-icon">🤗</span>Pet</button>
    <button class="action-btn" id="btn-play"  onclick="doAction('playing')"><span class="btn-icon">🎾</span>Play</button>
    <button class="action-btn" id="btn-sleep" onclick="toggleSleep()"      ><span class="btn-icon" id="sleep-icon">😴</span><span id="sleep-label">Sleep</span></button>
  </div>

  <div class="footer-hint" id="footer-hint">💾 Auto-saved · Loading…</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const BREEDS = {
  poodle: {
    name:'Toy Poodle', emoji:'🐩',
    primary:'#e879a0', accent:'#c0527a', light:'#fce4f0',
    bgGrad:'linear-gradient(145deg,#fef0f6 0%,#fde4f0 60%,#fcd6ea 100%)',
    cardBg:'#fff8fc', trait:'Clever & Cuddly',
    desc:'Loves cuddles and showing off fluffy curls!',
    sounds:['Yip yip!','Woof~','Mrrf!','Arf arf!','Yip!'],
    body:'#f9cce2', ear:'#f0a0c8', fluff:'#fde0ee',
    nose:'#c06080', eye:'#3a2030', innerEar:'#f8b8d8',
    leg:'#f0a8ca', tail:'#f0a0c8', paw:'#e890b8',
  },
  corgi: {
    name:'Corgi', emoji:'🐕',
    primary:'#f5a623', accent:'#c07d10', light:'#fff3d6',
    bgGrad:'linear-gradient(145deg,#fffbf0 0%,#fef5d6 60%,#fdecc0 100%)',
    cardBg:'#fffdf5', trait:'Playful & Zoomie',
    desc:'Short legs, BIG energy. Zoom mode: always on!',
    sounds:['BORK!','Woof!','Yap yap!','BORK BORK!','Arf!'],
    body:'#f0b850', ear:'#d08820', fluff:'#fff8e0',
    nose:'#5c3810', eye:'#2a1808', innerEar:'#ffcf7a',
    leg:'#e0a030', tail:'#d08820', paw:'#c07018',
  },
  pomeranian: {
    name:'Pomeranian', emoji:'🦊',
    primary:'#ff6b35', accent:'#cc4810', light:'#fff0ea',
    bgGrad:'linear-gradient(145deg,#fff5f0 0%,#ffe8dc 60%,#ffd8c8 100%)',
    cardBg:'#fff8f5', trait:'Fluffy & Fierce',
    desc:'Tiny floof with the confidence of a giant wolf!',
    sounds:['Yip yip!','Bark!','Mrrf!','YIPP!','Woof!'],
    body:'#f09060', ear:'#e06830', fluff:'#ffd0a0',
    nose:'#6a2808', eye:'#2a1000', innerEar:'#ffb080',
    leg:'#e07840', tail:'#e06830', paw:'#c85820',
  },
};

const STAGES = [
  {label:'Newborn 🥚', xpMin:0,    scale:.52},
  {label:'Puppy 🐾',   xpMin:120,  scale:.70},
  {label:'Doggo 🐕',   xpMin:350,  scale:.88},
  {label:'Adult 🐶',   xpMin:800,  scale:1.00},
  {label:'Elder 👑',   xpMin:1600, scale:1.08},
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let breed = null, petName = '', hunger = 80, happiness = 80, energy = 88, xp = 0;
let pose = 'idle', cooldown = false;
let tickTimer = null, xpTimer = null, saveTimer = null, msgTimer = null, poseTimer = null;
let particleId = 0;

function getStage(x) {
  let s = 0;
  for (let i=0;i<STAGES.length;i++) if (x >= STAGES[i].xpMin) s = i;
  return s;
}
function mood() { return (hunger + happiness + energy) / 3; }

// ═══════════════════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════════════════
const SAVE_KEY = 'pupPals_v3';
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({breed,petName,hunger,happiness,energy,xp})); } catch(e){}
}
function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.breed && BREEDS[d.breed]) return d;
  } catch(e){}
  return null;
}
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch(e){} }

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id + '-screen');
  el.classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// SELECT SCREEN — build cards
// ═══════════════════════════════════════════════════════════
function buildSelectScreen() {
  const container = document.getElementById('breed-cards');
  container.innerHTML = '';
  Object.entries(BREEDS).forEach(([key, b], i) => {
    const card = document.createElement('div');
    card.className = 'breed-card';
    card.style.cssText = `--light:${b.light}; animation-delay:${i*0.1}s`;
    card.innerHTML = `
      <div class="breed-emoji">${b.emoji}</div>
      <div class="breed-name">${b.name}</div>
      <div class="breed-trait" style="background:${b.primary}20;color:${b.accent}">${b.trait}</div>
      <p class="breed-desc">${b.desc}</p>
      <div class="adopt-btn" style="background:linear-gradient(135deg,${b.primary},${b.accent});box-shadow:0 4px 16px ${b.primary}55">Adopt! 🐾</div>
    `;
    card.onclick = () => openNaming(key);
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
// NAMING
// ═══════════════════════════════════════════════════════════
function openNaming(b) {
  breed = b;
  const br = BREEDS[b];
  document.getElementById('naming-emoji').textContent = br.emoji;
  document.getElementById('naming-title').textContent = `Name your ${br.name}!`;
  document.getElementById('name-input').value = br.name;
  document.getElementById('name-input').style.borderColor = br.primary;
  document.getElementById('confirm-btn').style.background = `linear-gradient(135deg,${br.primary},${br.accent})`;
  document.getElementById('confirm-btn').style.boxShadow = `0 6px 22px ${br.primary}55`;
  // Apply CSS vars to naming screen
  document.getElementById('naming-screen').style.cssText = `--primary:${br.primary};--accent:${br.accent}`;
  goTo('naming');
  setTimeout(() => document.getElementById('name-input').focus(), 100);
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmName(); });

function confirmName() {
  const val = document.getElementById('name-input').value.trim();
  petName = val || BREEDS[breed].name;
  hunger = 80; happiness = 80; energy = 88; xp = 0; pose = 'idle';
  startGame();
}

// ═══════════════════════════════════════════════════════════
// START / LOAD GAME
// ═══════════════════════════════════════════════════════════
function startGame() {
  applyBreedTheme();
  rebuildDogSVG();
  updateUI();
  goTo('game');
  stopTimers();
  startTimers();
  saveGame();
  showMsg(`${petName} has arrived! 🐾`, 2500);
}

function applyBreedTheme() {
  const b = BREEDS[breed];
  // Body background
  document.body.style.background = b.bgGrad;
  // Dog stage bg
  document.getElementById('dog-stage').style.background = b.cardBg;
  document.getElementById('stage-floor').style.background = `linear-gradient(180deg,transparent,${b.light})`;
  document.getElementById('stage-ground').style.background = b.primary + '22';
  // Stage badge
  const sb = document.getElementById('stage-badge');
  sb.style.background = `linear-gradient(90deg,${b.primary},${b.accent})`;
  // XP fill
  document.getElementById('xp-fill').style.background =
    `linear-gradient(90deg,${b.primary}80,${b.primary},${b.accent})`;
  // Happy stat fill
  document.getElementById('happy-fill').style.background =
    `linear-gradient(90deg,${b.primary}99,${b.primary})`;
  // Panels border/shadow
  const panels = document.querySelectorAll('.stats-panel,.actions-panel');
  panels.forEach(p => {
    p.style.boxShadow = `0 4px 18px ${b.primary}18`;
    p.style.borderColor = b.primary + '28';
  });
  // Action buttons color
  setBtnStyle('btn-feed',  '#ff7043');
  setBtnStyle('btn-pet',   b.primary);
  setBtnStyle('btn-play',  '#43a860');
  setBtnStyle('btn-sleep', '#5b9bd6');
  // Menu btn
  document.querySelector('.menu-btn').style.borderColor = b.primary + '55';
  document.querySelector('.menu-btn').style.color = b.accent;
  // Close menu btn
  document.getElementById('close-menu-btn').style.borderColor = b.primary;
  document.getElementById('close-menu-btn').style.background = b.primary + '18';
  document.getElementById('close-menu-btn').style.color = b.accent;
  // CSS vars for message bubble
  document.getElementById('message-bubble').style.borderColor = b.primary + '55';
  // Menu overlay
  document.getElementById('menu-overlay').style.borderColor = b.primary + '33';
}

function setBtnStyle(id, color) {
  const btn = document.getElementById(id);
  btn.style.borderColor = color;
  btn.style.background = color + '18';
  btn.style.color = color;
  btn._color = color; // store for re-enable
}

// ═══════════════════════════════════════════════════════════
// SVG DOG BUILDER
// ═══════════════════════════════════════════════════════════
function eyesSVG(c, currentPose, currentMood) {
  const cx1=40, cx2=62, cy=46;
  if (currentPose==='sleeping') return `
    <path d="M ${cx1-5} ${cy} Q ${cx1} ${cy-4} ${cx1+5} ${cy}" stroke="${c.eye}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M ${cx2-5} ${cy} Q ${cx2} ${cy-4} ${cx2+5} ${cy}" stroke="${c.eye}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
  if (currentMood>65) return `
    <path d="M ${cx1-5} ${cy+1} Q ${cx1} ${cy-5} ${cx1+5} ${cy+1}" stroke="${c.eye}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M ${cx2-5} ${cy+1} Q ${cx2} ${cy-5} ${cx2+5} ${cy+1}" stroke="${c.eye}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  if (currentMood<28) return `
    <path d="M ${cx1-5} ${cy-1} Q ${cx1} ${cy+5} ${cx1+5} ${cy-1}" stroke="${c.eye}" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M ${cx2-5} ${cy-1} Q ${cx2} ${cy+5} ${cx2+5} ${cy-1}" stroke="${c.eye}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  return `
    <circle cx="${cx1}" cy="${cy}" r="5" fill="${c.eye}"/>
    <circle cx="${cx2}" cy="${cy}" r="5" fill="${c.eye}"/>
    <circle cx="${cx1+2}" cy="${cy-2}" r="1.8" fill="white"/>
    <circle cx="${cx2+2}" cy="${cy-2}" r="1.8" fill="white"/>`;
}

function mouthSVG(currentPose, currentMood) {
  if (currentPose==='sleeping') return `<path d="M 44 60 Q 51 63 58 60" stroke="#b08090" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
  if (currentMood>65) return `<path d="M 42 59 Q 51 68 60 59" stroke="#8a5060" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
  if (currentMood<28) return `<path d="M 42 63 Q 51 56 60 63" stroke="#8a5060" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  return `<path d="M 44 61 Q 51 64 58 61" stroke="#8a5060" stroke-width="2" fill="none" stroke-linecap="round"/>`;
}

function blushSVG(currentPose, currentMood) {
  if (currentPose==='sleeping'||currentMood<50) return '';
  const op = currentMood>75 ? 0.5 : 0.28;
  return `<ellipse cx="32" cy="56" rx="7" ry="4.5" fill="#ffb3c8" opacity="${op}"/>
          <ellipse cx="70" cy="56" rx="7" ry="4.5" fill="#ffb3c8" opacity="${op}"/>`;
}

function zzzSVG() {
  return `
    <text x="68" y="38" font-size="9"  fill="#90b8e8" font-family="'Baloo 2'" font-weight="800" style="animation:zzzFloat 2.2s ease-in-out infinite;animation-delay:0s">z</text>
    <text x="74" y="26" font-size="12" fill="#90b8e8" font-family="'Baloo 2'" font-weight="800" style="animation:zzzFloat 2.2s ease-in-out infinite;animation-delay:.7s">z</text>
    <text x="81" y="14" font-size="15" fill="#90b8e8" font-family="'Baloo 2'" font-weight="800" style="animation:zzzFloat 2.2s ease-in-out infinite;animation-delay:1.4s">z</text>`;
}

function sparkleSVG() {
  return ['✨','💕','⭐','✨'].map((s,i)=>
    `<text x="${18+i*18}" y="${20+(i%2)*12}" font-size="12" style="animation:zzzFloat 1.1s ease-out infinite;animation-delay:${i*0.22}s">${s}</text>`
  ).join('');
}

function tailSVG(c, isSleep, isHappy, origin, inner) {
  const anim = isHappy ? 'tailFast .28s ease-in-out infinite alternate' : 'tailSlow 1.1s ease-in-out infinite alternate';
  if (isSleep) return '';
  return `<g style="transform-origin:${origin};animation:${anim}">${inner}</g>`;
}

function rebuildDogSVG() {
  const el = document.getElementById('dog-svg-container');
  el.innerHTML = buildDogSVG(breed, pose, mood());
  updateDogAnimation();
  updateDogScale();
}

function updateDogAnimation() {
  const el = document.getElementById('dog-svg-container');
  const m = mood();
  let anim = 'idleBob 3.5s ease-in-out infinite';
  if (pose==='sleeping')  anim = 'sleepBreathe 3s ease-in-out infinite';
  else if (pose==='eating')   anim = 'eatNod .55s ease-in-out infinite';
  else if (pose==='petting')  anim = 'petWiggle .45s ease-in-out infinite';
  else if (pose==='playing')  anim = 'runCycle 1.6s ease-in-out infinite';
  else if (m < 28)            anim = 'sadDroop 2.8s ease-in-out infinite';
  else if (m > 65)            anim = 'happyBounce .9s ease-in-out infinite';
  el.style.animation = anim;
}

function updateDogScale() {
  const stage = getStage(xp);
  const el = document.getElementById('dog-svg-container');
  el.style.transform = `scale(${STAGES[stage].scale})`;
  el.style.transformOrigin = 'bottom center';
}

// ═══════════════════════════════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════════════════════════════
function updateUI() {
  const b = BREEDS[breed];
  const stage = getStage(xp);
  const m = mood();

  // Header
  document.getElementById('pet-name-line').textContent = `${b.emoji} ${petName}`;
  document.getElementById('stage-badge').textContent = STAGES[stage].label;

  // XP
  const xpNext = stage < STAGES.length-1 ? STAGES[stage+1].xpMin : null;
  const xpPrev = STAGES[stage].xpMin;
  const xpPct  = xpNext ? ((xp - xpPrev) / (xpNext - xpPrev)) * 100 : 100;
  document.getElementById('xp-label').textContent = `⚡ XP ${Math.floor(xp)}`;
  document.getElementById('xp-next-label').textContent = xpNext ? `Next: ${xpNext} XP` : '👑 MAX STAGE';
  document.getElementById('xp-fill').style.width = xpPct + '%';

  // Stats
  setStatBar('hunger',   hunger);
  setStatBar('happy',    happiness);
  setStatBar('energy',   energy);

  // Mood badge
  let emoji = '😄';
  if (pose==='sleeping') emoji='💤';
  else if (m>78) emoji='😄';
  else if (m>55) emoji='🙂';
  else if (m>32) emoji='😐';
  else           emoji='😢';
  document.getElementById('mood-badge').textContent = emoji;

  // Sleep button
  document.getElementById('sleep-icon').textContent  = pose==='sleeping' ? '🌅' : '😴';
  document.getElementById('sleep-label').textContent = pose==='sleeping' ? 'Wake' : 'Sleep';

  // Button states
  setButtonDisabled('btn-feed',  cooldown || pose==='sleeping' || hunger>92);
  setButtonDisabled('btn-pet',   cooldown || pose==='sleeping');
  setButtonDisabled('btn-play',  cooldown || pose==='sleeping' || energy<18);

  // Footer
  document.getElementById('footer-hint').textContent =
    m < 20 ? '⚠️ Your pet needs attention!' : `💾 Auto-saved · ${STAGES[stage].label}`;

  // Dog SVG update (eyes/mouth/blush change with mood)
  rebuildDogSVG();
}

function setStatBar(id, val) {
  const pct = Math.max(0, Math.min(100, val));
  const isLow = pct < 25;
  const fill = document.getElementById(id + '-fill');
  const valEl = document.getElementById(id + '-val');
  fill.style.width = pct + '%';
  valEl.textContent = Math.round(pct);
  valEl.style.color = isLow ? '#e05030' : '';
  if (isLow) valEl.classList.add('low-anim'); else valEl.classList.remove('low-anim');

  if (isLow) {
    fill.style.background = 'linear-gradient(90deg,#ff9060,#ff5030)';
    fill.style.boxShadow = '0 0 8px #ff706088';
  } else {
    // restore default colours
    if (id === 'hunger') { fill.style.background='linear-gradient(90deg,#ff906099,#ff7043)'; fill.style.boxShadow='0 0 5px #ff704366'; }
    if (id === 'happy')  { const b=BREEDS[breed]; fill.style.background=`linear-gradient(90deg,${b.primary}99,${b.primary})`; fill.style.boxShadow=`0 0 5px ${b.primary}66`; }
    if (id === 'energy') { fill.style.background='linear-gradient(90deg,#90caf999,#42a5f5)'; fill.style.boxShadow='0 0 5px #42a5f566'; }
  }
}

function setButtonDisabled(id, dis) {
  const btn = document.getElementById(id);
  btn.disabled = dis;
  if (!dis && btn._color) {
    btn.style.borderColor = btn._color;
    btn.style.background  = btn._color + '18';
    btn.style.color       = btn._color;
  }
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function doAction(type) {
  if (cooldown || pose==='sleeping') return;
  clearTimeout(poseTimer);
  const b = BREEDS[breed];
  const sound = b.sounds[Math.floor(Math.random()*b.sounds.length)];
  cooldown = true;
  pose = type;

  if (type==='eating') {
    hunger = Math.min(100, hunger+28);
    xp += 6;
    showMsg(`${sound} Om nom nom! 🦴`, 2000);
    spawnParticles(['🦴','🦴','✨','🦴','✨'], 5);
  } else if (type==='petting') {
    happiness = Math.min(100, happiness+22);
    xp += 5;
    showMsg(`${sound} More pats please! 💕`, 2000);
    spawnParticles(['❤️','💕','❤️','💕','❤️','💕'], 6);
  } else if (type==='playing') {
    happiness = Math.min(100, happiness+16);
    energy    = Math.max(0, energy-12);
    xp += 10;
    showMsg(`ZOOM ZOOM! ${sound} 🎾`, 2000);
    spawnParticles(['⭐','💨','⭐','💨','⭐'], 5);
  }

  updateUI();

  poseTimer = setTimeout(() => {
    pose = 'idle';
    cooldown = false;
    updateUI();
  }, 2000);
}

function toggleSleep() {
  clearTimeout(poseTimer);
  cooldown = false;
  if (pose==='sleeping') {
    pose = 'idle';
    showMsg('Rise and shine! 🌞', 1800);
  } else {
    pose = 'sleeping';
    showMsg('Sweet dreams 💤', 1800);
  }
  updateUI();
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticles(emojis, count) {
  const container = document.getElementById('particles');
  for (let i=0; i<count; i++) {
    const e = emojis[i % emojis.length];
    const el = document.createElement('div');
    const angle = Math.random()*Math.PI*2;
    const d1 = 38 + Math.random()*55, d2 = d1+20+Math.random()*30;
    const tr  = (Math.random()-.5)*70, tr2 = (Math.random()-.5)*130;
    el.style.cssText = `
      position:absolute;
      left:${44 + (Math.random()-.5)*60}px;
      top:${50 + (Math.random()-.5)*44}px;
      font-size:18px; pointer-events:none;
      --tx:${Math.cos(angle)*d1}px; --ty:${Math.sin(angle)*d1-18}px;
      --tx2:${Math.cos(angle)*d2}px; --ty2:${Math.sin(angle)*d2-32}px;
      --tr:${tr}deg; --tr2:${tr2}deg;
      animation:particlePop ${900+Math.random()*400}ms ease-out forwards;
    `;
    el.textContent = e;
    container.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

// ═══════════════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════════════
function showMsg(text, dur=2200) {
  clearTimeout(msgTimer);
  const el = document.getElementById('message-bubble');
  el.textContent = text;
  el.classList.add('show');
  el.style.animation = 'none';
  el.offsetWidth; // reflow
  el.style.animation = '';
  msgTimer = setTimeout(() => {
    el.classList.remove('show');
  }, dur);
}

// ═══════════════════════════════════════════════════════════
// TIMERS
// ═══════════════════════════════════════════════════════════
function startTimers() {
  tickTimer = setInterval(() => {
    hunger    = Math.max(0, hunger - 0.7);
    happiness = Math.max(0, happiness - 0.45);
    if (pose==='sleeping') energy = Math.min(100, energy+2.2);
    else energy = Math.max(0, energy - 0.25);

    // Auto sleep
    if (energy < 12 && pose==='idle') { pose='sleeping'; showMsg('Too tired… 💤 going to sleep'); }
    if (energy > 55 && pose==='sleeping') { pose='idle'; showMsg('Good morning! 🌞'); }

    updateUI();
  }, 3000);

  xpTimer = setInterval(() => {
    if (mood() > 40) { xp += 1; updateUI(); }
  }, 6000);

  saveTimer = setInterval(saveGame, 8000);
}

function stopTimers() {
  clearInterval(tickTimer); clearInterval(xpTimer); clearInterval(saveTimer);
}

// ═══════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════
function toggleMenu() {
  const el = document.getElementById('menu-overlay');
  el.classList.toggle('show');
}

function abandonPet() {
  if (!confirm('Are you sure? Your pet will be lost forever! 😢')) return;
  stopTimers();
  clearSave();
  breed = null; petName = ''; hunger = 80; happiness = 80; energy = 88; xp = 0;
  pose = 'idle'; cooldown = false;
  document.getElementById('menu-overlay').classList.remove('show');
  document.body.style.background = 'linear-gradient(160deg,#fde8f8 0%,#e8f8f0 50%,#e8f0fd 100%)';
  buildSelectScreen();
  goTo('select');
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
buildSelectScreen();

const saved = loadGame();
if (saved && BREEDS[saved.breed]) {
  breed     = saved.breed;
  petName   = saved.petName  || BREEDS[breed].name;
  hunger    = saved.hunger    ?? 80;
  happiness = saved.happiness ?? 80;
  energy    = saved.energy    ?? 88;
  xp        = saved.xp        ?? 0;
  applyBreedTheme();
  rebuildDogSVG();
  updateUI();
  goTo('game');
  stopTimers();
  startTimers();
  showMsg(`Welcome back, ${petName}! 🐾`, 2500);
} else {
  goTo('select');
}
</script>
</body>
</html>
